name: Build VortexCam APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # manual "Run workflow" button

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      # Generate the android/ platform scaffolding. flutter create does NOT
      # overwrite our existing lib/main.dart or pubspec.yaml.
      - name: Scaffold android project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.vortexengine --project-name vortexcam .

      # Inject runtime permissions + allow cleartext (the WHIP URL is http:// on LAN)
      # and force minSdk 23 (required by flutter_webrtc).
      - name: Patch manifest + gradle
        run: |
          python3 - <<'PY'
          import re, glob, io, os

          # ---- AndroidManifest.xml ----
          man = "android/app/src/main/AndroidManifest.xml"
          s = open(man, encoding="utf-8").read()
          perms = [
              "android.permission.CAMERA",
              "android.permission.RECORD_AUDIO",
              "android.permission.INTERNET",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.FLASHLIGHT",
          ]
          inject = "".join(
              f'    <uses-permission android:name="{p}"/>\n' for p in perms
              if p not in s
          )
          if inject:
              s = s.replace("<application", inject + "    <application", 1)
          # allow cleartext HTTP (LAN WHIP endpoint)
          if "usesCleartextTraffic" not in s:
              s = s.replace("<application", '<application android:usesCleartextTraffic="true"', 1)
          open(man, "w", encoding="utf-8").write(s)
          print("patched manifest")

          # ---- build.gradle(.kts): force minSdk 23 (flutter_webrtc needs >=23) ----
          # Also pin ndkVersion to 25.2.9519653 (r25c): flutter_zxing 1.x vendors
          # ZXing-C++ code that uses std::basic_string_view<unsigned char>, which
          # was removed from NDK 28's strict libc++. NDK 25 still accepts it.
          import subprocess, json
          # Find an available NDK 25 on the runner
          ndk_root = "/usr/local/lib/android/sdk/ndk"
          try:
              ndks = os.listdir(ndk_root)
              ndk25 = next((n for n in sorted(ndks) if n.startswith("25.")), None)
              ndk_ver = ndk25 if ndk25 else "25.2.9519653"
          except Exception:
              ndk_ver = "25.2.9519653"
          print(f"Using NDK version: {ndk_ver}")

          for g in glob.glob("android/app/build.gradle*"):
              t = open(g, encoding="utf-8").read()
              t = t.replace("flutter.minSdkVersion", "23")
              # Inject ndkVersion inside the android { } block if not present
              if "ndkVersion" not in t:
                  t = t.replace("compileSdk", f'ndkVersion "{ndk_ver}"\n        compileSdk', 1)
              open(g, "w", encoding="utf-8").write(t)
              print("patched", g)

          # ---- gradle.properties: use the UNBUNDLED (Play Services) ML Kit model ----
          # The default *bundled* barcode model NPEs on some devices ("genericError":
          # null object reference inside ML Kit). The unbundled model is delivered
          # per-device by Google Play Services and avoids that crash (also smaller).
          gp = "android/gradle.properties"
          props = open(gp, encoding="utf-8").read() if os.path.exists(gp) else ""
          if "useUnbundled" not in props:
              with open(gp, "a", encoding="utf-8") as f:
                  f.write("\ndev.steenbakker.mobile_scanner.useUnbundled=true\n")
              print("patched gradle.properties: unbundled ML Kit")
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vortexcam-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
