name: Build VortexCam APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # manual "Run workflow" button

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      # Generate the android/ platform scaffolding. flutter create does NOT
      # overwrite our existing lib/main.dart or pubspec.yaml.
      # We preserve our custom native plugins (.kt) before deleting android/,
      # then restore them after flutter create regenerates the build scaffolding.
      - name: Scaffold android project
        run: |
          PLUGIN_DIR="android/app/src/main/kotlin/com/vortex/vortexcam"
          mkdir -p /tmp/vortex_plugins
          cp "$PLUGIN_DIR/VortexCamPlugin.kt"  /tmp/vortex_plugins/
          cp "$PLUGIN_DIR/OmtStreamPlugin.kt"  /tmp/vortex_plugins/
          cp "$PLUGIN_DIR/MainActivity.kt"     /tmp/vortex_plugins/
          # Preserve JNI/C++ sources and prebuilt .so files
          cp -r "android/app/src/main/cpp"         /tmp/vortex_cpp       2>/dev/null || true
          cp -r "android/app/src/main/jniLibs"     /tmp/vortex_jniLibs   2>/dev/null || true

          rm -rf android
          flutter create --platforms=android --org com.vortex --project-name vortexcam .

          DST_DIR="android/app/src/main/kotlin/com/vortex/vortexcam"
          mkdir -p "$DST_DIR"
          cp /tmp/vortex_plugins/VortexCamPlugin.kt  "$DST_DIR/"
          cp /tmp/vortex_plugins/OmtStreamPlugin.kt  "$DST_DIR/"
          cp /tmp/vortex_plugins/MainActivity.kt     "$DST_DIR/"
          # Restore JNI sources and prebuilt libraries
          cp -r /tmp/vortex_cpp     "android/app/src/main/"  2>/dev/null || true
          cp -r /tmp/vortex_jniLibs "android/app/src/main/"  2>/dev/null || true

      # Inject runtime permissions + allow cleartext (the WHIP URL is http:// on LAN)
      # and force minSdk 23 (required by flutter_webrtc).
      - name: Patch manifest + gradle
        run: |
          python3 - <<'PY'
          import re, glob, os

          # ---- AndroidManifest.xml ----
          man = "android/app/src/main/AndroidManifest.xml"
          s = open(man, encoding="utf-8").read()
          perms = [
              "android.permission.CAMERA",
              "android.permission.RECORD_AUDIO",
              "android.permission.INTERNET",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.FLASHLIGHT",
          ]
          inject = "".join(
              f'    <uses-permission android:name="{p}"/>\n' for p in perms
              if p not in s
          )
          if inject:
              s = s.replace("<application", inject + "    <application", 1)
          if "usesCleartextTraffic" not in s:
              s = s.replace("<application", '<application android:usesCleartextTraffic="true"', 1)
          open(man, "w", encoding="utf-8").write(s)
          print("patched manifest")

          # ---- build.gradle(.kts): force minSdk 23 + wire CMake for JNI ----
          import os
          for g in glob.glob("android/app/build.gradle*"):
              t = open(g, encoding="utf-8").read()
              t = t.replace("flutter.minSdkVersion", "23")
              # Inject CMake externalNativeBuild block if not already present.
              # Built as a single \n-joined string so no .yml line dips below the
              # run-block base indentation (that breaks the YAML literal scalar).
              if "externalNativeBuild" not in t and "android {" in t:
                  cmake_block = (
                      "\n    externalNativeBuild {\n"
                      "        cmake {\n"
                      "            path \"src/main/cpp/CMakeLists.txt\"\n"
                      "            version \"3.22.1\"\n"
                      "        }\n"
                      "    }\n"
                      "    defaultConfig {\n"
                      "        externalNativeBuild {\n"
                      "            cmake {\n"
                      "                abiFilters \"arm64-v8a\"\n"
                      "            }\n"
                      "        }\n"
                      "    }\n"
                  )
                  t = t.replace("android {", "android {" + cmake_block, 1)
              open(g, "w", encoding="utf-8").write(t)
              print("patched", g)

          # (mobile_scanner removed — flutter_zxing used instead; no ML Kit patch needed)
          PY

      - name: Get dependencies
        run: flutter pub get

      # flutter_zxing 1.x bundles ZXing-C++ whose Utf.cpp defines:
      #   #if __cplusplus <= 201703L
      #   using char8_t = uint8_t;   // uint8_t == unsigned char
      #   #endif
      #   using utf8_t = std::basic_string_view<char8_t>;
      #
      # NDK 26+ libc++ removed char_traits<unsigned char>, so
      # basic_string_view<uint8_t/unsigned char> fails to compile.
      # Fix: change the C++17 shim from uint8_t to char — utf8_t then
      # resolves to basic_string_view<char>, which has a valid char_traits.
      - name: Patch flutter_zxing ZXing-C++ source for NDK 26+
        run: |
          set -e
          ZXING_PKG=$(find "$HOME/.pub-cache/hosted/pub.dev" \
                          -maxdepth 1 -name "flutter_zxing-*" -type d \
                          | sort -V | tail -1)
          echo "flutter_zxing package: $ZXING_PKG"
          UTC="$ZXING_PKG/src/zxing/core/src/Utf.cpp"
          if [ ! -f "$UTC" ]; then
            echo "ERROR: Utf.cpp not found; scanning pub-cache:"
            find "$HOME/.pub-cache" -name "Utf.cpp" 2>/dev/null
            exit 1
          fi
          echo "=== BEFORE ===" && grep -n "char8_t\|utf8_t\|uint8_t" "$UTC" | head -10
          sed -i 's/using char8_t = uint8_t;/using char8_t = char;/' "$UTC"
          echo "=== AFTER ===" && grep -n "char8_t\|utf8_t\|uint8_t" "$UTC" | head -10
          # Remove cmake cache so NDK recompiles with the patched source.
          rm -rf "$ZXING_PKG/android/.cxx/" || true
          echo "cmake cache cleared"

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vortexcam-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: VortexCam — Latest Build
          body: |
            Descargá el APK e instalalo en tu Android.
            Activá "Instalar apps de fuentes desconocidas" en Ajustes si es necesario.
          files: build/app/outputs/flutter-apk/app-release.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
