name: Build VortexCam APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # manual "Run workflow" button

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      # Generate the android/ platform scaffolding. flutter create does NOT
      # overwrite our existing lib/main.dart or pubspec.yaml.
      - name: Scaffold android project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.vortexengine --project-name vortexcam .

      # Create asset directories declared in pubspec.yaml
      - name: Create asset directories
        run: mkdir -p assets/icons

      # Inject runtime permissions + allow cleartext (the WHIP URL is http:// on LAN)
      # and force minSdk 23 (required by flutter_webrtc).
      - name: Patch manifest + gradle
        run: |
          python3 - <<'PY'
          import re, glob, os

          # ---- AndroidManifest.xml ----
          man = "android/app/src/main/AndroidManifest.xml"
          s = open(man, encoding="utf-8").read()
          perms = [
              "android.permission.CAMERA",
              "android.permission.RECORD_AUDIO",
              "android.permission.INTERNET",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.FLASHLIGHT",
          ]
          inject = "".join(
              f'    <uses-permission android:name="{p}"/>\n' for p in perms
              if p not in s
          )
          if inject:
              s = s.replace("<application", inject + "    <application", 1)
          if "usesCleartextTraffic" not in s:
              s = s.replace("<application", '<application android:usesCleartextTraffic="true"', 1)
          open(man, "w", encoding="utf-8").write(s)
          print("patched manifest")

          # ---- build.gradle(.kts): force minSdk 23 ----
          for g in glob.glob("android/app/build.gradle*"):
              t = open(g, encoding="utf-8").read()
              t = t.replace("flutter.minSdkVersion", "23")
              open(g, "w", encoding="utf-8").write(t)
              print("patched", g)

          # ---- gradle.properties: unbundled ML Kit model ----
          gp = "android/gradle.properties"
          props = open(gp, encoding="utf-8").read() if os.path.exists(gp) else ""
          if "useUnbundled" not in props:
              with open(gp, "a", encoding="utf-8") as f:
                  f.write("\ndev.steenbakker.mobile_scanner.useUnbundled=true\n")
              print("patched gradle.properties: unbundled ML Kit")
          PY

      - name: Get dependencies
        run: flutter pub get

      # flutter_zxing 1.x vendors ZXing-C++ that defines utf8_t as
      # std::basic_string_view<unsigned char>. NDK 26+ removed the
      # char_traits<unsigned char> specialization from libc++ (it was never
      # in the C++ standard). The fix used in newer ZXing-C++ versions is to
      # change the typedef to std::basic_string_view<char> — semantically
      # identical for UTF-8 byte processing.
      - name: Patch flutter_zxing ZXing-C++ source for NDK 26+
        run: |
          find "$HOME/.pub-cache" -name "Utf.h" -path "*/flutter_zxing*" | while read f; do
            sed -i 's/basic_string_view<unsigned char>/basic_string_view<char>/g' "$f"
            echo "Patched: $f"
          done

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vortexcam-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
