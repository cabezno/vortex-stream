name: vortex_cam
description: VortexCam — Use your phone as a professional camera for VortexEngine
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.0

  # WebRTC — for WHIP protocol (phone → VortexEngine)
  flutter_webrtc: ^1.4.1

  # HTTP — for WHIP signaling POST
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Network discovery (find VortexEngine on LAN)
  multicast_dns: ^0.3.2+5

  # Settings persistence
  shared_preferences: ^2.2.3

  # UI extras
  cupertino_icons: ^1.0.6
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
