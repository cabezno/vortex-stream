name: samba_air
description: "Samba Air — Professional multi-transport camera app for SAMBA"
version: 0.6.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC — WHIP protocol (phone → VortexEngine)
  flutter_webrtc: ^1.4.1

  # HTTP — WHIP signaling POST
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Settings persistence (last-used engine IP, camera name)
  shared_preferences: ^2.2.3

  # QR scanner — ZXing C++/FFI, no ML Kit (avoids NPE on some devices)
  flutter_zxing: ^1.6.1

  # Permissions
  permission_handler: ^11.3.1

  # Local log file (shipped to the PC for analysis)
  path_provider: ^2.1.3

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon_samba.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
