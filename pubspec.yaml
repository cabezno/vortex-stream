name: vortex_cam
description: VortexCam — Professional multi-transport camera app for VortexEngine
version: 0.5.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC — WHIP protocol (phone → VortexEngine)
  flutter_webrtc: ^1.4.1

  # HTTP — WHIP signaling POST
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Settings persistence (last-used engine IP, camera name)
  shared_preferences: ^2.2.3

  # QR scanner — ZXing C++/FFI, no ML Kit (avoids NPE on some devices)
  flutter_zxing: ^1.6.1

  # Permissions
  permission_handler: ^11.3.1

  # WiFi — auto-connect to PC hotspot when credentials are in the QR
  wifi_iot: ^0.3.19+2

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
