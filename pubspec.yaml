name: vortexcam
description: "VortexCam — turn your phone into a camera for VortexEngine (WHIP/WebRTC)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^1.4.1    # camera capture + WebRTC PeerConnection (WHIP publish)
                            # >=1.x: drops the removed Android v1 embedding (Registrar)
  flutter_zxing: ^2.3.0     # QR pairing scan via ZXing (C++/FFI) — no ML Kit /
                            # Play Services, avoids the ML Kit init NPE on some devices
  http: ^1.2.2              # WHIP HTTP POST/DELETE
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
